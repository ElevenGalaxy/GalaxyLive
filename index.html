<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLive - Official Support</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #120c1f 0%, #1a103c 100%);
            color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px; border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            max-width: 400px; width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        h1 {
            font-size: 2.5rem; margin-bottom: 10px;
            background: linear-gradient(45deg, #a855f7, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            display: block; text-decoration: none; padding: 14px;
            border-radius: 12px; font-weight: 600; font-size: 1rem;
            transition: all 0.2s ease;
        }
        .btn-primary { background: #6366f1; color: #ffffff; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #e2e8f0; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
    </style>
    <script>
        // Eğer Google veya bir kullanıcı direkt link parametresiyle gelirse otomatik yönlendirir
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('page') === 'privacy') {
                window.location.href = "https://github.com/ElevenGalaxy/GalaxyLive/blob/main/PrivacyPolicy";
            } else if (urlParams.get('page') === 'terms') {
                window.location.href = "https://github.com/ElevenGalaxy/GalaxyLive/blob/main/Terms_of_service";
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>GLive</h1>
        <p>Official Legal Documents for GLive Application by com.elevengalaxy.</p>
        <div class="btn-group">
            <a href="https://github.com/ElevenGalaxy/GalaxyLive/blob/main/PrivacyPolicy" class="btn btn-primary">Privacy Policy</a>
            <a href="https://github.com/ElevenGalaxy/GalaxyLive/blob/main/Terms_of_service" class="btn btn-secondary">Terms of Service</a>
        </div>
    </div>
</body>
</html>
